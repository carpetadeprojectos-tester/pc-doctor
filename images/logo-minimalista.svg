  <!-- Texto -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">PC</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">DOCTOR</text>
